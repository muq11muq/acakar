[deploy]
buildCommand = "mkdir -p staticfiles && python manage.py collectstatic --noinput --ignore *.pyc"
startCommand = "python manage.py migrate --noinput && PYTHONPATH=. gunicorn dalal_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/"
healthcheckTimeout = 30

[env]
DEBUG = "False"
ALLOWED_HOSTS = "*"
DB_ENGINE = "mysql"
SECRET_KEY = ""
DATABASE_URL = ""
