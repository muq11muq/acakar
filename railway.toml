[deploy]
buildCommand = "python manage.py collectstatic --noinput && python manage.py migrate --noinput"
startCommand = "PYTHONPATH=/app gunicorn dalal_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/"
healthcheckTimeout = 30

[build]
builder = "nixpacks"

[env]
DEBUG = "False"
ALLOWED_HOSTS = "*"
CSRF_TRUSTED_ORIGINS = "https://*"
DB_ENGINE = "mysql"
SECRET_KEY = ""
DATABASE_URL = ""
