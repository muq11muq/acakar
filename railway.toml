[deploy]
buildCommand = "PYTHONPATH=/app pip install -r requirements.txt && PYTHONPATH=/app python manage.py collectstatic --noinput && PYTHONPATH=/app python manage.py migrate --noinput"
startCommand = "PYTHONPATH=/app gunicorn dalal_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/health/"
healthcheckTimeout = 30

[build.env]
MISE_PYTHON_GITHUB_ATTESTATIONS = "false"
