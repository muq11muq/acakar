[deploy]
buildCommand = "python manage.py collectstatic --noinput --clear"
startCommand = "python manage.py migrate --noinput && PYTHONPATH=. gunicorn dalal_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/"
healthcheckTimeout = 30

[env]
DEBUG = "False"
ALLOWED_HOSTS = "*"
CSRF_TRUSTED_ORIGINS = "https://acakar-production.up.railway.app"
DB_ENGINE = "mysql"
SECRET_KEY = ""
DATABASE_URL = ""
