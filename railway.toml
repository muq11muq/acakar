[deploy]
buildCommand = "python manage.py collectstatic --noinput"
startCommand = "mkdir -p staticfiles && unset CSRF_TRUSTED_ORIGINS && unset DATABASE_URL && python manage.py migrate --noinput && PYTHONPATH=. gunicorn dalal_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/"
healthcheckTimeout = 30

[env]
DEBUG = "False"
ALLOWED_HOSTS = "*"
DB_ENGINE = "sqlite"
SECRET_KEY = ""
DATABASE_URL = ""
