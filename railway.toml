[build]
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --skip-checks --noinput"

[deploy]
startCommand = "python manage.py migrate --skip-checks --noinput && PYTHONPATH=. gunicorn dalal_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/"
healthcheckTimeout = 60

[env]
DEBUG = "False"
ALLOWED_HOSTS = "acakar-production.up.railway.app"
CSRF_TRUSTED_ORIGINS = "https://acakar-production.up.railway.app"
DB_ENGINE = "mysql"
SECRET_KEY = ""
RAILWAY_PUBLIC_DOMAIN = "acakar-production.up.railway.app"
