<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل العقار - دلال</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">🏠 دلال</a>
      <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="index.html#properties">العقارات</a></li>
        <li><a href="contact.html">التواصل</a></li>
        <li id="dashboard-link" style="display:none"><a href="dashboard.html">لوحة التحكم</a></li>
        <li id="login-nav"><a href="#login" onclick="openModal('loginModal')">تسجيل الدخول</a></li>
        <li id="logout-nav" style="display:none"><a href="#" onclick="logout()">تسجيل الخروج</a></li>
      </ul>
    </div>
  </nav>

  <div class="container property-detail-container">
    <div id="property-detail" class="property-detail-card"></div>
  </div>

  <!-- Login Modal -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('loginModal')">&times;</span>
      <h2>👤 تسجيل الدخول</h2>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>اسم المستخدم</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">دخول</button>
        <p class="hint">الدلال: admin / admin</p>
      </form>
    </div>
  </div>

  <!-- Contact Broker Modal -->
  <div id="contactModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('contactModal')">&times;</span>
      <h2>💬 تواصل مع الدلال</h2>
      <form id="contactForm" onsubmit="handleContact(event)">
        <div class="form-group">
          <label>اسمك</label>
          <input type="text" id="contact-name" required>
        </div>
        <div class="form-group">
          <label>رسالتك</label>
          <textarea id="contact-message" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">إرسال</button>
        <div id="broker-phone" class="broker-phone"></div>
      </form>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container"></div>

  <footer class="footer">
    <div class="container">
      <p>دلال - جميع الحقوق محفوظة</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initApp();
      renderPropertyDetail();
    });
  </script>
</body>
</html>
