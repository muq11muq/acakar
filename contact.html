<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التواصل - دلال</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">🏠 دلال</a>
      <ul class="nav-links">
        <li><a href="index.html">الرئيسية</a></li>
        <li><a href="index.html#properties">العقارات</a></li>
        <li><a href="contact.html">التواصل</a></li>
        <li id="dashboard-link" style="display:none"><a href="dashboard.html">لوحة التحكم</a></li>
        <li id="login-nav"><a href="#login" onclick="openModal('loginModal')">تسجيل الدخول</a></li>
        <li id="logout-nav" style="display:none"><a href="#" onclick="logout()">تسجيل الخروج</a></li>
      </ul>
    </div>
  </nav>

  <div class="container contact-container">
    <h1>💬 التواصل</h1>
    <div class="contact-grid">
      <div class="card">
        <h2>📱 رقم الهاتف</h2>
        <p class="phone-number" id="main-phone">0770 123 4567</p>
        <button class="btn btn-primary" onclick="copyPhone()">نسخ الرقم</button>
      </div>
      <div class="card">
        <h2>✉️ إرسال رسالة</h2>
        <form onsubmit="handleContact(event)">
          <div class="form-group">
            <label>اسمك</label>
            <input type="text" id="contact-name" required>
          </div>
          <div class="form-group">
            <label>رسالتك</label>
            <textarea id="contact-message" rows="5" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">إرسال</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Login Modal -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('loginModal')">&times;</span>
      <h2>👤 تسجيل الدخول</h2>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>اسم المستخدم</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">دخول</button>
        <p class="hint">الدلال: admin / admin</p>
      </form>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container"></div>

  <footer class="footer">
    <div class="container">
      <p>دلال - جميع الحقوق محفوظة</p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initApp();
    });
    function copyPhone() {
      navigator.clipboard.writeText('07701234567');
      showToast('تم نسخ الرقم', 'success');
    }
  </script>
</body>
</html>
