{% extends 'properties/base.html' %}

{% block title %}تسجيل الدخول{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>🔐 دخول الدلال</h1>
    <form method="post">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom:1rem">
        <label>اسم المستخدم</label>
        <input type="text" name="username" class="form-control" required autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:1.5rem">
        <label>كلمة المرور</label>
        <input type="password" name="password" class="form-control" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">دخول</button>
    </form>
    <div style="margin-top:1.25rem;padding:1rem;background:#e3f2fd;border-radius:10px;font-size:0.9rem">
      <strong>بيانات الدخول:</strong><br>
      المستخدم: <code>admin</code><br>
      كلمة المرور: <code>admin123</code>
    </div>
    <p style="text-align:center;margin-top:1rem;font-size:0.85rem">
      <a href="{% url 'home' %}">العودة للرئيسية</a>
    </p>
  </div>
</div>
{% endblock %}
